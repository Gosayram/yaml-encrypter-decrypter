name: CI Quality Gate

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version

      - name: Go Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('.go-version') }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('.go-version') }}-
            ${{ runner.os }}-go-

      - name: Verify modules
        run: go mod verify

      - name: Run tests with race and coverage
        run: make ci-test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 7

      - name: Run golangci-lint
        env:
          GOGC: 10
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          args: --timeout=10m
          only-new-issues: true

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@672a31696676d1592844bf0164b3bbfd855a4d50 # v1.4.1
        with:
          version: "0.7.0"
          install-go: false
          cache-key: ${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Build cross-platform binaries
        run: make ci-build

      - name: Package build artifacts
        run: make ci-package

      - name: Upload binaries artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yed-binaries-${{ github.run_id }}
          path: |
            bin/
            checksums.txt
          retention-days: 7

  notify:
    name: Telegram Notify
    runs-on: ubuntu-latest
    needs: [quality]
    if: always()
    steps:
      - name: Send telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_RELEASER_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.YED_CHAT_ID }}
          QUALITY_RESULT: ${{ needs.quality.result }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set, skipping notification"
            exit 0
          fi

          if [ "$QUALITY_RESULT" = "success" ]; then
            ICON="✅"
            STATE="SUCCESS"
          else
            ICON="❌"
            STATE="FAILED"
          fi

          MSG="<b>CI Quality Gate:</b> $STATE%0A%0A<b>Information:</b>%0ARepository: ${{ github.repository }}%0ARef: ${{ github.ref_name }}%0AActor: ${{ github.actor }}%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="${MSG}"
