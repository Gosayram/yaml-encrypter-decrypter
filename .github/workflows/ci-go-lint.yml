name: CI Quality Gate

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: .go-version

      - name: Go Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('.go-version') }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('.go-version') }}-
            ${{ runner.os }}-go-

      - name: Verify modules
        run: go mod verify

      - name: Run tests with race and coverage
        run: make ci-test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 7

      - name: Run golangci-lint
        env:
          GOGC: 10
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          args: --timeout=10m
          only-new-issues: true

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@672a31696676d1592844bf0164b3bbfd855a4d50 # v1.4.1
        with:
          version: "0.7.0"
          install-go: false
          cache-key: ${{ runner.os }}-${{ hashFiles('.go-version') }}

      - name: Build cross-platform binaries
        run: make ci-build

      - name: Package build artifacts
        run: make ci-package

      - name: Upload binaries artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: yed-binaries-${{ github.run_id }}
          path: |
            bin/
            checksums.txt
          retention-days: 7

  notify:
    name: Telegram Notify
    runs-on: ubuntu-latest
    needs: [quality]
    if: always() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''
    steps:
      - name: Send telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          QUALITY_RESULT: ${{ needs.quality.result }}
        run: |
          if [ "$QUALITY_RESULT" = "success" ]; then
            ICON="✅"
            STATE="SUCCESS"
          else
            ICON="❌"
            STATE="FAILED"
          fi

          MSG="$ICON *CI Quality Gate*: $STATE%0ARepository: \`${{ github.repository }}\`%0ARef: \`${{ github.ref_name }}\`%0AActor: \`${{ github.actor }}\`%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="${MSG}"
