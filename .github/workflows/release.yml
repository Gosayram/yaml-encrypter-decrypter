name: Release

on:
  push:
    # Run only on tags
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Read version from .release-version
        id: version
        run: |
          if [ -f .release-version ]; then
            VERSION=$(head -n 1 .release-version | tr -d '[:space:]')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
            echo "Read version from .release-version: $VERSION"
          else
            # Fallback to tag name without 'v' prefix
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
            echo "Using tag version: $VERSION"
          fi

          # Set repository URL for GoReleaser templates
          GITHUB_REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          echo "GITHUB_REPO_URL=$GITHUB_REPO_URL" >> $GITHUB_ENV
          echo "Repository URL: $GITHUB_REPO_URL"

          # Set Docker repository path (lowercase owner/repo for GHCR)
          DOCKER_REPO_PATH=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKER_REPO_PATH=$DOCKER_REPO_PATH" >> $GITHUB_ENV
          echo "Docker repository path: $DOCKER_REPO_PATH"

          # Extract repository name (without owner) for Docker package URLs
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "Repository name: $REPO_NAME"

      # Import GPG key for signing binaries and checksums
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Run GoReleaser:
      # - Builds binaries (signed with GPG)
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GPG signing for binaries and checksums
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          # Repository URL for templates
          GITHUB_REPO_URL: ${{ env.GITHUB_REPO_URL }}
          # Docker repository path for templates
          DOCKER_REPO_PATH: ${{ env.DOCKER_REPO_PATH }}
          # Repository name for Docker package URLs
          REPO_NAME: ${{ env.REPO_NAME }}
          # Telegram announcement
          TELEGRAM_TOKEN: ${{ secrets.TG_RELEASER_TOKEN }}
          YED_CHAT_ID: ${{ secrets.YED_CHAT_ID }}
