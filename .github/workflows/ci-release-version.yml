name: Version Automation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update_release_version:
    name: Update .release-version
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.CONTENT_RELEASE }}

      - name: Determine next tag and update file
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          IFS='.' read -r major minor patch <<< "${latest_tag#v}"
          patch=$((patch + 1))
          if [ "$patch" -ge 10 ]; then
            patch=0
            minor=$((minor + 1))
          fi
          if [ "$minor" -ge 10 ]; then
            minor=0
            major=$((major + 1))
          fi
          new_tag="v$major.$minor.$patch"

          echo "$new_tag" > .release-version
          echo "$new_tag (build ${{ github.run_id }})" >> .release-version

      - name: Generate CHANGELOG
        run: |
          chmod +x hack/generate-changelog.sh
          ./hack/generate-changelog.sh CHANGELOG.md

      - name: Commit .release-version and CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .release-version CHANGELOG.md
          git commit -m "[RELEASE] - update .release-version and CHANGELOG;" || exit 0
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          new_tag=$(head -n 1 .release-version)
          if git rev-parse "$new_tag" >/dev/null 2>&1; then
            echo "Tag $new_tag already exists, skipping"
            exit 0
          fi
          git tag "$new_tag"
          git push origin "$new_tag"

  notify:
    name: Telegram Notify
    runs-on: ubuntu-latest
    needs: [update_release_version]
    if: always()
    steps:
      - name: Send telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_RELEASER_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.YED_CHAT_ID }}
          JOB_RESULT: ${{ needs.update_release_version.result }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set, skipping notification"
            exit 0
          fi

          if [ "$JOB_RESULT" = "success" ]; then
            ICON="✅"
            STATE="SUCCESS"
          else
            ICON="❌"
            STATE="FAILED"
          fi

          MSG="$ICON *Version Automation*: $STATE%0ARepository: \`${{ github.repository }}\`%0ABranch: \`${{ github.ref_name }}\`%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="${MSG}"
