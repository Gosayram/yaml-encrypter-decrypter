name: Autoapproval

on:
  pull_request:
    types: [opened, reopened, labeled, edited]
  pull_request_review:
    types: [dismissed]

permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  autoapproval:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    name: Autoapproval
    steps:
      - uses: dkhmelenko/autoapproval@a34fdae5ad67207842cf2909f9421817931247c0 # v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.MR_TOKEN }}
